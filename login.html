<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mentoria MITE</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #141414; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #1f1f1f; padding: 40px; border-radius: 8px; width: 350px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #E50914; margin-bottom: 25px; }
        label { font-size: 14px; color: #aaa; }
        input { width: 100%; padding: 12px; margin: 8px 0 20px 0; border-radius: 4px; border: none; background: #333; color: white; box-sizing: border-box;}
        button { width: 100%; padding: 12px; background-color: #E50914; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background-color: #b20710; }
        .links { text-align: center; margin-top: 20px; font-size: 14px; }
        .links a { color: #aaa; text-decoration: none; }
        .links a:hover { color: #E50914; }
        .autor { font-size: 11px; text-align: center; color: #555; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h2>MITE - Área do Aluno</h2>
    
    <label>E-mail de Cadastro:</label>
    <input type="email" id="email" placeholder="Digite seu e-mail">
    
    <label>Sua Senha:</label>
    <input type="password" id="senha" placeholder="Digite sua senha">
    
    <button onclick="fazerLogin()">Entrar na Plataforma</button>
    
    <div class="links">
        <p><a href="index.html">Ainda não é aluno? Inscreva-se aqui!</a></p>
    </div>
    
    <div class="autor">Autor: Luiz de Castro - Mestre em Gestão e Adm. de Empresas</div>
</div>

<script>
    function fazerLogin() {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;

        if (!email || !senha) {
            alert("Por favor, preencha todos os campos.");
            return;
        }

        const idLimpa = email.replace(/[^a-zA-Z0-9]/g, "");
        // URL do seu Firebase (Mantenha a mesma que usamos antes)
        const urlFirebase = "https://mite-mentoria-default-rtdb.firebaseio.com/alunos/" + idLimpa + ".json";

        // Busca os dados do aluno no Firebase
        fetch(urlFirebase)
        .then(response => response.json())
        .then(aluno => {
            if (!aluno) {
                alert("E-mail não encontrado. Verifique se digitou corretamente ou faça sua inscrição.");
                return;
            }

            // Verifica se a senha bate
            if (aluno.senha === senha) {
                alert(`Bem-vindo de volta, ${aluno.nome}!`);
                
                // Guarda o e-mail no navegador para sabermos quem está logado (útil para a prova)
                localStorage.setItem('email_aluno_mite', email);
                
                // Redireciona para a plataforma
                window.location.href = "plataforma.html";
            } else {
                alert("Senha incorreta. Tente novamente.");
            }
        })
        .catch(error => {
            alert("Erro ao conectar com o sistema. Tente novamente mais tarde.");
        });
    }
</script>

</body>
</html>
