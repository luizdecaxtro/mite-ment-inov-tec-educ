<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mentoria MITE</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: radial-gradient(circle at top right, #2c0305, #141414 60%);
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: rgba(31, 31, 31, 0.75); 
            backdrop-filter: blur(10px);
            padding: 50px 40px; 
            border-radius: 16px; 
            width: 400px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        h2 { 
            text-align: center; 
            color: #E50914; 
            margin-bottom: 30px; 
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .campo-grupo {
            margin-bottom: 22px;
        }
        label { 
            font-size: 15px; 
            color: #cccccc; 
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(45, 45, 45, 0.9); 
            color: white; 
            font-size: 16px;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #E50914;
            background: #333;
            box-shadow: 0 0 8px rgba(229, 9, 20, 0.3);
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background-color: #E50914; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
            transition: background 0.2s, transform 0.1s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }
        button:hover { 
            background-color: #f41521; 
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .links { 
            text-align: center; 
            margin-top: 25px; 
            font-size: 15px; 
        }
        .links a { 
            color: #aaaaaa; 
            text-decoration: none; 
            transition: color 0.2s;
        }
        .links a:hover { 
            color: #E50914; 
        }
        .autor { 
            font-size: 11px; 
            text-align: center; 
            color: #777777; 
            margin-top: 40px; 
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Área do Aluno</h2>
    
    <div class="campo-grupo">
        <label for="email">E-mail de Cadastro</label>
        <input type="email" id="email" placeholder="Digite seu e-mail">
    </div>
    
    <div class="campo-grupo">
        <label for="senha">Sua Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha">
    </div>
    
    <button onclick="fazerLogin()">Entrar na Plataforma</button>
    
    <div class="links">
        <p><a href="index.html">Ainda não é aluno? Inscreva-se aqui!</a></p>
    </div>
    
    <div class="autor">Autor: Luiz de Castro - Mestre em Gestão e Adm. de Empresas</div>
</div>

<script>
    function fazerLogin() {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;

        if (!email || !senha) {
            alert("Por favor, preencha todos os campos.");
            return;
        }

        const idLimpa = email.replace(/[^a-zA-Z0-9]/g, "");
        const urlFirebase = "https://mite-mentoria-default-rtdb.firebaseio.com/alunos/" + idLimpa + ".json";

        fetch(urlFirebase)
        .then(response => response.json())
        .then(aluno => {
            if (!aluno) {
                alert("E-mail não encontrado. Verifique se digitou corretamente ou faça sua inscrição.");
                return;
            }

            if (aluno.senha === senha) {
                localStorage.setItem('email_aluno_mite', email);
                window.location.href = "plataforma.html";
            } else {
                alert("Senha incorreta. Tente novamente.");
            }
        })
        .catch(error => {
            alert("Erro ao conectar com o sistema. Tente novamente mais tarde.");
        });
    }
</script>

</body>
</html>
