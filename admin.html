<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - MITE</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; background-color: #f4f4f4;}
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 900px; margin: 0 auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #E50914; color: white; }
        .btn { padding: 5px 10px; cursor: pointer; border: none; border-radius: 3px; color: white;}
        .btn-del { background: #f44336; }
        .btn-update { background: #4CAF50; }
    </style>
</head>
<body>

<div class="container">
    <h1>Administração MITE</h1>
    <p>Gestão exclusiva do site www.lojasdecastro.com.br</p>
    <button onclick="carregarAlunos()" style="padding: 10px; background: #333; color: white; border: none; cursor: pointer;">🔄 Atualizar Lista</button>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Nota Atual</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabelaAlunos">
            </tbody>
    </table>
</div>

<script>
    // Sistema de senha rudimentar
    const senha = prompt("Digite a senha do administrador:");
    if(senha !== "123456") { // Altere a senha aqui
        alert("Acesso Negado!");
        window.location.href = "https://www.lojasdecastro.com.br";
    } else {
        carregarAlunos();
    }

    function carregarAlunos() {
        const urlFirebase = "SUA_URL_DO_FIREBASE_AQUI/alunos.json";
        
        fetch(urlFirebase)
        .then(res => res.json())
        .then(data => {
            const tabela = document.getElementById('tabelaAlunos');
            tabela.innerHTML = "";

            for(let id in data) {
                const aluno = data[id];
                tabela.innerHTML += `
                    <tr>
                        <td>${aluno.nome}</td>
                        <td>${aluno.email}</td>
                        <td>${aluno.nota}</td>
                        <td>${aluno.status}</td>
                        <td>
                            <button class="btn btn-update" onclick="alterarNota('${id}')">Alterar Nota</button>
                            <button class="btn btn-del" onclick="excluirAluno('${id}')">Excluir</button>
                        </td>
                    </tr>
                `;
            }
        });
    }

    function alterarNota(id) {
        const novaNota = prompt("Digite a nova nota do aluno (0 a 10):");
        if(!novaNota) return;

        const urlFirebase = "SUA_URL_DO_FIREBASE_AQUI/alunos/" + id + ".json";
        
        fetch(urlFirebase, {
            method: 'PATCH',
            body: JSON.stringify({ nota: parseFloat(novaNota) })
        }).then(() => carregarAlunos());
    }

    function excluirAluno(id) {
        if(!confirm("Tem certeza que deseja excluir este aluno?")) return;

        const urlFirebase = "SUA_URL_DO_FIREBASE_AQUI/alunos/" + id + ".json";
        
        fetch(urlFirebase, {
            method: 'DELETE'
        }).then(() => carregarAlunos());
    }
</script>

</body>
</html>
