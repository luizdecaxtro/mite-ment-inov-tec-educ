<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Mentoria MITE</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #141414; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #1f1f1f; padding: 40px; border-radius: 8px; width: 350px; }
        h2 { text-align: center; color: #E50914; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; border: none; background: #333; color: white; box-sizing: border-box;}
        button { width: 100%; padding: 12px; background-color: #E50914; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .autor { font-size: 11px; text-align: center; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>MITE - Inscrição</h2>
    <p style="text-align: center; font-size: 14px;">Valor do Investimento: R$ 797,00</p>
    
    <label>Nome Completo:</label>
    <input type="text" id="nome" placeholder="Seu nome">
    
    <label>E-mail:</label>
    <input type="email" id="email" placeholder="Seu melhor e-mail">
    
    <label>Crie uma Senha:</label>
    <input type="password" id="senha" placeholder="Senha de acesso">
    
    <button onclick="cadastrarAluno()">Inscrever-se e Pagar</button>
    
    <div class="autor">Autor: Luiz de Castro - Mestre em Gestão e Adm. de Empresas</div>
</div>

<script>
    function cadastrarAluno() {
        const nome = document.getElementById('nome').value;
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;

        if(!nome || !email || !senha) {
            alert("Por favor, preencha todos os campos.");
            return;
        }

        const idLimpa = email.replace(/[^a-zA-Z0-9]/g, "");
        const urlFirebase = "https://mite-mentoria-default-rtdb.firebaseio.com/alunos/" + idLimpa + ".json";

        // 1. PRIMEIRO VERIFICAMOS SE O ALUNO JÁ EXISTE NO BANCO
        fetch(urlFirebase)
        .then(response => response.json())
        .then(alunoExistente => {
            
            let dadosAluno = {
                nome: nome,
                email: email,
                senha: senha,
                nota: 0,
                tentativas: 0,
                status: "Aguardando Pagamento"
            };

            if (alunoExistente && alunoExistente.data) {
                // Se já existir, mantemos a data da primeira inscrição dele!
                dadosAluno.data = alunoExistente.data;
                dadosAluno.nota = alunoExistente.nota || 0;
                dadosAluno.tentativas = alunoExistente.tentativas || 0;
            } else {
                // Se for aluno novo, cria a data de hoje
                dadosAluno.data = new Date().toLocaleDateString('pt-BR');
            }

            // 2. SALVA OU ATUALIZA NO FIREBASE
            return fetch(urlFirebase, {
                method: 'PUT',
                body: JSON.stringify(dadosAluno)
            });
        })
        .then(response => {
            alert("Cadastro verificado com sucesso! Redirecionando para o pagamento.");
            // REDIRECIONA PARA A INFINITEPAY
            window.location.href = "https://loja.infinitepay.io/decastro247/pen6874-mite---mentoria---plano---premium";
        })
        .catch(error => alert("Erro ao processar o cadastro. Tente novamente."));
    }
</script>

</body>
</html>
