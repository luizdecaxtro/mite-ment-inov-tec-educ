<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca de Cases | MIT·GESTÃO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050a14;--surface:#0d1526;--surface2:#111e35;--accent:#00d4ff;--accent2:#ff4d6d;--accent3:#7c3aed;--gold:#f5c518;--text:#e8eef7;--muted:#6b7fa3;--border:rgba(0,212,255,0.15);}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 48px;background:rgba(5,10,20,.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nlogo{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:3px;color:var(--accent);text-decoration:none}
.nback{color:var(--muted);text-decoration:none;font-size:.85rem;transition:.3s}.nback:hover{color:var(--accent)}
.hero{text-align:center;padding:72px 24px 48px;background:radial-gradient(ellipse 70% 50% at 50% 40%,rgba(255,77,109,.06) 0%,transparent 70%)}
.h-label{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--accent2);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
.h-title{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;line-height:1;margin-bottom:12px}
.h-title span{color:var(--accent2)}
.h-sub{color:var(--muted);font-size:.95rem;max-width:560px;margin:0 auto 32px;line-height:1.7}
.filter-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.fb{padding:6px 18px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:.8rem;cursor:pointer;transition:.3s}
.fb:hover,.fb.active{background:rgba(255,77,109,.1);border-color:var(--accent2);color:var(--accent2)}
.content{max-width:1200px;margin:0 auto;padding:48px 24px 80px}
.cases-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
.case-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:.3s;cursor:pointer}
.case-card:hover{border-color:rgba(0,212,255,.3);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,212,255,.1)}
.case-thumb{height:140px;display:flex;align-items:center;justify-content:center;font-size:4rem;position:relative}
.case-body{padding:20px}
.case-company{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.case-title{font-weight:700;font-size:1rem;margin-bottom:8px;line-height:1.3}
.case-desc{font-size:.84rem;color:var(--muted);line-height:1.6;margin-bottom:14px}
.case-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.ct{font-size:.68rem;padding:2px 9px;border-radius:100px;font-weight:700}
.ct-a{background:rgba(0,212,255,.1);color:var(--accent)}
.ct-b{background:rgba(124,58,237,.15);color:#a78bfa}
.ct-c{background:rgba(16,185,129,.12);color:#34d399}
.ct-d{background:rgba(245,197,24,.1);color:var(--gold)}
.btn-case{display:inline-flex;align-items:center;gap:6px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.15);color:var(--accent);padding:8px 16px;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;transition:.3s;text-decoration:none}
.btn-case:hover{background:rgba(0,212,255,.15)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(5,10,20,.92);z-index:500;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid rgba(0,212,255,.2);border-radius:18px;padding:44px;width:100%;max-width:720px;position:relative}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:18px 18px 0 0}
.modal.m-a::before{background:linear-gradient(90deg,var(--accent),var(--accent3))}
.modal.m-b::before{background:linear-gradient(90deg,var(--gold),#f97316)}
.modal.m-c::before{background:linear-gradient(90deg,#10b981,var(--accent))}
.modal.m-d::before{background:linear-gradient(90deg,var(--accent2),var(--accent3))}
.close-btn{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer}.close-btn:hover{color:var(--accent2)}
.m-co{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.m-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;margin-bottom:16px}
.m-section{margin-bottom:20px}
.m-section h4{font-weight:700;font-size:.9rem;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.m-section p{font-size:.88rem;color:var(--muted);line-height:1.75}
.m-result{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:10px;padding:16px;margin-top:16px}
.m-result h4{color:#34d399;margin-bottom:8px}
.m-lessons{background:var(--surface2);border-radius:10px;padding:16px;margin-top:12px}
.m-lessons h4{color:var(--gold);margin-bottom:8px;font-weight:700;font-size:.9rem}
.m-lessons ul{list-style:none;display:flex;flex-direction:column;gap:6px}
.m-lessons li{font-size:.85rem;color:var(--muted);display:flex;gap:8px}.m-lessons li::before{content:'→';color:var(--accent);flex-shrink:0}
@media(max-width:768px){nav{padding:14px 20px}.content{padding:32px 16px}.modal{padding:28px 20px}}
</style>
</head>
<body>
<nav>
  <a href="../index.html" class="nlogo">MIT·GESTÃO</a>
  <a href="../index.html" class="nback">← Voltar ao site</a>
</nav>

<div class="hero">
  <div class="h-label">Material Didático Oficial</div>
  <div class="h-title">🔬 Biblioteca de <span>Cases</span></div>
  <p class="h-sub">Estudos de caso reais de inovação tecnológica em grandes organizações brasileiras e globais.</p>
  <div class="filter-row">
    <button class="fb active" onclick="setF('')" data-f="">Todos</button>
    <button class="fb" onclick="setF('digital')" data-f="digital">Transformação Digital</button>
    <button class="fb" onclick="setF('ia')" data-f="ia">Inteligência Artificial</button>
    <button class="fb" onclick="setF('dados')" data-f="dados">Dados & BI</button>
    <button class="fb" onclick="setF('inovacao')" data-f="inovacao">Inovação de Produto</button>
  </div>
</div>

<div class="content">
  <div class="cases-grid" id="grid"></div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal-box">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
const CASES=[
  {id:'nubank',emoji:'💜',bg:'linear-gradient(135deg,#1a0d2e,#2d1b4e)',company:'Nubank',title:'Como o Nubank democratizou serviços financeiros com IA',desc:'O Nubank usou inteligência artificial e análise de dados para oferecer crédito a milhões de brasileiros excluídos do sistema bancário tradicional.',tags:['ia','dados'],label1:'ia',label2:'dados',cor:'m-a',
  contexto:'Fundado em 2013, o Nubank nasceu da frustração com os bancos tradicionais brasileiros — taxas abusivas, atendimento ruim e burocracia excessiva. A startup decidiu criar um banco 100% digital, sem agências físicas.',
  desafio:'Avaliar crédito de pessoas sem histórico bancário (os chamados "sem arquivo"), que representam mais de 40% dos brasileiros adultos, sem incorrer em altos índices de inadimplência.',
  solucao:'Desenvolvimento de modelos proprietários de machine learning que analisam mais de 3.000 variáveis além do score de crédito tradicional, incluindo comportamento digital, padrões de uso e dados alternativos.',
  resultado:'Nubank atingiu 100+ milhões de clientes, tornou-se o maior banco digital do mundo, com taxa de inadimplência consistentemente abaixo da média do setor.',
  licoes:['IA pode ser usada para inclusão financeira, não apenas eficiência operacional','Dados alternativos são mais preditivos que dados tradicionais para populações sub-atendidas','Cultura data-driven precisa estar no DNA desde o início','Tecnologia bem aplicada reduz custo de análise e aumenta inclusão']},
  {id:'magalu',emoji:'🛍️',bg:'linear-gradient(135deg,#0d1a26,#1a2e40)',company:'Magazine Luiza',title:'A transformação digital que salvou e reinventou o Magalu',desc:'De varejista tradicional em crise a uma das empresas mais inovadoras do Brasil: como o Magalu se tornou uma plataforma de ecossistema digital.',tags:['digital','dados'],label1:'digital',label2:'dados',cor:'m-b',
  contexto:'Em 2015, o Magalu enfrentava queda de vendas, endividamento e questionamentos sobre sua sobrevivência. Com Frederico Trajano assumindo como CEO, a empresa iniciou uma profunda transformação digital.',
  desafio:'Competir com gigantes do e-commerce como Amazon e Mercado Livre, enquanto mantinha milhares de lojas físicas e funcionários, num mercado de margens comprimidas.',
  solucao:'Criação do "Magalu como plataforma": integração total de canais (phygital), marketplace aberto a terceiros, desenvolvimento de FinTech própria (Magalu Pay), aquisições estratégicas (Netshoes, KaBuM!, Steal the Look) e digitalização dos vendedores.',
  resultado:'As ações valorizaram +30.000% entre 2015 e 2021. O Magalu tornou-se a maior plataforma de varejo do Brasil, com mais de 50 milhões de clientes ativos.',
  licoes:['A loja física pode ser ativo competitivo em uma estratégia digital (ponto de entrega, estoque descentralizado)','Transformação digital exige mudança cultural antes de mudança tecnológica','Plataformas criam mais valor que produtos isolados','Aquisições estratégicas aceleram a transformação quando bem integradas']},
  {id:'embraer',emoji:'✈️',bg:'linear-gradient(135deg,#0d1a1a,#1a2e2e)',company:'Embraer',title:'Indústria 4.0 na fabricação de aeronaves',desc:'Como a Embraer implementou manufatura inteligente, IoT e gêmeos digitais para revolucionar a produção aeronáutica brasileira.',tags:['digital','ia'],label1:'digital',label2:'ia',cor:'m-c',
  contexto:'A Embraer é um dos maiores fabricantes de aeronaves do mundo. Diante da crescente concorrência e necessidade de reduzir custos de produção mantendo padrões rigorosos de qualidade e segurança.',
  desafio:'Modernizar uma linha de produção altamente especializada e regulada sem interromper operações, reduzindo retrabalhos, desperdícios e tempo de ciclo de produção.',
  solucao:'Implementação de gêmeos digitais (digital twins) das aeronaves, sensores IoT em toda a linha de produção, IA para controle de qualidade visual, robôs colaborativos e manutenção preditiva baseada em dados.',
  resultado:'Redução de 30% no tempo de montagem em alguns processos, diminuição de 40% nos defeitos detectados tardiamente, e criação de novo modelo de serviço pós-venda baseado em dados de telemetria das aeronaves.',
  licoes:['Industria 4.0 não é substituir humanos, é potencializar sua capacidade com tecnologia','Digital twin permite testar e otimizar antes de implementar no mundo físico','Manutenção preditiva gera mais valor que manutenção preventiva','Qualidade por dados é mais precisa e menos custosa que qualidade por inspeção humana']},
  {id:'ambev',emoji:'🍺',bg:'linear-gradient(135deg,#1a1a0d,#2e2e1a)',company:'Ambev',title:'BI e Analytics para otimização da cadeia de distribuição',desc:'Como a Ambev usa inteligência de dados para otimizar rotas, prever demanda e maximizar a eficiência de distribuição em todo o Brasil.',tags:['dados','digital'],label1:'dados',label2:'digital',cor:'m-d',
  contexto:'A Ambev opera uma das maiores e mais complexas redes de distribuição de bebidas do mundo, com milhões de pontos de venda espalhados por todo o Brasil, incluindo regiões remotas.',
  desafio:'Otimizar o abastecimento de mais de 1 milhão de pontos de venda, minimizando rupturas de estoque (produto em falta) e ao mesmo tempo reduzindo custo logístico e desperdício.',
  solucao:'Plataforma proprietária de analytics com modelos de previsão de demanda por região, clima e sazonalidade; otimização dinâmica de rotas; dashboard em tempo real para distribuidores; e gestão por dados dos representantes comerciais.',
  resultado:'Redução de 25% nas rupturas de estoque, diminuição de 15% no custo logístico e aumento de 20% na eficiência das rotas de distribuição, gerando economia de centenas de milhões de reais.',
  licoes:['Dados de campo são tão valiosos quanto dados de vendas','Previsão de demanda reduz tanto ruptura quanto excesso de estoque','Tecnologia de otimização de rotas pode ser diferencial competitivo no varejo','Dashboards em tempo real mudam o comportamento dos times comerciais']},
  {id:'totvs',emoji:'💼',bg:'linear-gradient(135deg,#0d1526,#1a2540)',company:'TOTVS',title:'Plataforma de ERP inteligente com IA embarcada',desc:'A maior empresa de tecnologia do Brasil e como integrou IA generativa e analytics no coração dos sistemas de gestão empresarial.',tags:['ia','inovacao'],label1:'ia',label2:'inovacao',cor:'m-a',
  contexto:'A TOTVS domina o mercado de ERP para médias empresas no Brasil, mas enfrentava pressão crescente de concorrentes globais como SAP e Oracle, além de startups de nicho.',
  desafio:'Modernizar uma plataforma legada usada por mais de 40.000 empresas, integrando tecnologias de IA sem comprometer a estabilidade e continuidade dos sistemas críticos dos clientes.',
  solucao:'Desenvolvimento da plataforma Carol (nuvem de dados com IA), integração de assistentes de IA generativa nos módulos de ERP, analytics preditivo financeiro e criação de marketplace de aplicações de parceiros.',
  resultado:'Crescimento de 30% na receita de produtos de nuvem, adoção por mais de 8.000 empresas da plataforma Carol e posicionamento como líder em IA para gestão no mercado brasileiro.',
  licoes:['Legado não é obstáculo quando há estratégia clara de modernização gradual','IA embarcada no ERP gera mais adoção que ferramentas separadas','Ecossistema de parceiros acelera inovação sem aumentar custos fixos','Mercado brasileiro tem especificidades que globais ignoram']},
  {id:'ifood',emoji:'🍔',bg:'linear-gradient(135deg,#1a0a0d,#2e1a1a)',company:'iFood',title:'Machine Learning para personalização e otimização logística',desc:'Como o iFood usa IA e dados para conectar milhões de pedidos por dia, personalizar experiências e otimizar entregas em tempo real.',tags:['ia','dados','inovacao'],label1:'ia',label2:'dados',cor:'m-c',
  contexto:'O iFood processa mais de 80 milhões de pedidos por mês, conectando 300.000 restaurantes e 300.000 entregadores em mais de 1.700 cidades brasileiras.',
  desafio:'Otimizar em milissegundos o matching entre pedido, restaurante e entregador, personalizar a experiência de cada usuário e prever demanda para posicionamento de entregadores.',
  solucao:'Algoritmos de ML para previsão de demanda por zona e horário, sistema de matching dinâmico com múltiplas variáveis, motor de recomendação personalizado por usuário e plataforma de dados para restaurantes.',
  resultado:'Redução de 15% no tempo médio de entrega, aumento de 30% na conversão de pedidos com recomendações personalizadas e modelo de previsão de demanda com precisão superior a 90%.',
  licoes:['ML em tempo real exige infraestrutura robusta e equipe especializada','Dados de comportamento são mais valiosos que dados demográficos para personalização','Otimização de duas pontas (oferta e demanda) é mais complexa e mais poderosa','Transparência de dados para parceiros cria lealdade ao ecossistema']}
]

let filtroAtivo=''
function setF(f){filtroAtivo=f;document.querySelectorAll('.fb').forEach(b=>b.classList.toggle('active',b.dataset.f===f));renderGrid()}
function renderGrid(){
  let cases=CASES
  if(filtroAtivo)cases=cases.filter(c=>c.tags.includes(filtroAtivo))
  const tagNames={ia:'IA & ML',dados:'Dados & BI',digital:'Transf. Digital',inovacao:'Inovação'}
  const tagClass={ia:'ct-a',dados:'ct-d',digital:'ct-c',inovacao:'ct-b'}
  document.getElementById('grid').innerHTML=cases.map(c=>`
    <div class="case-card" onclick="openModal('${c.id}')">
      <div class="case-thumb" style="background:${c.bg}">${c.emoji}</div>
      <div class="case-body">
        <div class="case-company">${c.company}</div>
        <div class="case-title">${c.title}</div>
        <div class="case-desc">${c.desc}</div>
        <div class="case-tags">${c.tags.map(t=>`<span class="ct ${tagClass[t]}">${tagNames[t]}</span>`).join('')}</div>
        <button class="btn-case">📖 Ler case completo</button>
      </div>
    </div>`).join('')
}

function openModal(id){
  const c=CASES.find(x=>x.id===id);if(!c)return
  const tagNames={ia:'IA & ML',dados:'Dados & BI',digital:'Transf. Digital',inovacao:'Inovação'}
  document.getElementById('modal-box').className=`modal ${c.cor}`
  document.getElementById('modal-content').innerHTML=`
    <div class="m-co">${c.company} · Case de Inovação</div>
    <div class="m-title">${c.title}</div>
    <div class="m-section"><h4>🏢 Contexto</h4><p>${c.contexto}</p></div>
    <div class="m-section"><h4>🎯 Desafio</h4><p>${c.desafio}</p></div>
    <div class="m-section"><h4>💡 Solução Implementada</h4><p>${c.solucao}</p></div>
    <div class="m-result"><h4>📈 Resultados Obtidos</h4><p style="font-size:.88rem;color:var(--muted);line-height:1.75">${c.resultado}</p></div>
    <div class="m-lessons"><h4>🎓 Lições para Gestores</h4><ul>${c.licoes.map(l=>`<li>${l}</li>`).join('')}</ul></div>`
  document.getElementById('modal-bg').classList.add('open')
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open')}
document.getElementById('modal-bg').addEventListener('click',function(e){if(e.target===this)closeModal()})
renderGrid()
</script>
</body>
</html>
