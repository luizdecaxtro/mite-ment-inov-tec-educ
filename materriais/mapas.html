<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapas Mentais | MITe</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050a14;--surface:#0d1526;--surface2:#111e35;--accent:#00d4ff;--accent2:#ff4d6d;--accent3:#7c3aed;--gold:#f5c518;--text:#e8eef7;--muted:#6b7fa3;--border:rgba(0,212,255,0.15);}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 48px;background:rgba(5,10,20,.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nlogo{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:3px;color:var(--accent);text-decoration:none}
.nback{color:var(--muted);text-decoration:none;font-size:.85rem;transition:.3s}.nback:hover{color:var(--accent)}
.hero{text-align:center;padding:72px 24px 48px}
.h-label{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
.h-title{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;line-height:1;margin-bottom:12px}
.h-title span{color:var(--accent3)}
.h-sub{color:var(--muted);font-size:.95rem;max-width:560px;margin:0 auto;line-height:1.7}
.content{max-width:1000px;margin:0 auto;padding:48px 24px 80px}
.mod-select{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:40px}
.ms{padding:8px 20px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:.82rem;cursor:pointer;transition:.3s}
.ms:hover,.ms.active{background:rgba(124,58,237,.15);border-color:var(--accent3);color:var(--accent3)}
.mapa-wrap{display:none;animation:fadeIn .4s ease}.mapa-wrap.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.mapa-header{text-align:center;margin-bottom:32px}
.mapa-mod{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.mapa-title{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;color:var(--text)}
.mapa-svg-wrap{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;overflow-x:auto}
.mapa-svg-wrap svg{width:100%;min-width:600px;height:auto}
.btn-dl{display:inline-flex;align-items:center;gap:8px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.15);color:var(--accent);padding:10px 22px;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:.3s;margin:24px auto 0;display:flex;width:fit-content}
.btn-dl:hover{background:rgba(0,212,255,.15);transform:translateY(-2px)}
</style>
</head>
<body>
<nav>
  <a href="../index.html" class="nlogo">MITe</a>
  <a href="../index.html" class="nback">← Voltar ao site</a>
</nav>
<div class="hero">
  <div class="h-label">Material Didático Oficial</div>
  <div class="h-title">🗺️ Mapas <span>Mentais</span></div>
  <p class="h-sub">Síntese visual de cada módulo para revisão rápida e fixação do conteúdo. Selecione o módulo abaixo.</p>
</div>
<div class="content">
  <div class="mod-select">
    <button class="ms active" onclick="showMap('m01')" data-m="m01">M01</button>
    <button class="ms" onclick="showMap('m02')" data-m="m02">M02</button>
    <button class="ms" onclick="showMap('m03')" data-m="m03">M03</button>
    <button class="ms" onclick="showMap('m04')" data-m="m04">M04</button>
    <button class="ms" onclick="showMap('m05')" data-m="m05">M05</button>
    <button class="ms" onclick="showMap('m06')" data-m="m06">M06</button>
    <button class="ms" onclick="showMap('m07')" data-m="m07">M07</button>
    <button class="ms" onclick="showMap('m08')" data-m="m08">M08</button>
  </div>

  <!-- M01 -->
  <div class="mapa-wrap show" id="map-m01">
    <div class="mapa-header">
      <div class="mapa-mod">Módulo 01</div>
      <div class="mapa-title">O Novo Paradigma da Gestão</div>
    </div>
    <div class="mapa-svg-wrap">
      <svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="Outfit,sans-serif">
        <rect width="700" height="420" fill="#0d1526" rx="12"/>
        <!-- Centro -->
        <ellipse cx="350" cy="210" rx="90" ry="40" fill="#00d4ff" opacity=".15" stroke="#00d4ff" stroke-width="1.5"/>
        <text x="350" y="205" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="700">NOVO PARADIGMA</text>
        <text x="350" y="222" text-anchor="middle" fill="#00d4ff" font-size="11">DA GESTÃO</text>
        <!-- Ramos -->
        <line x1="260" y1="210" x2="140" y2="120" stroke="#7c3aed" stroke-width="1.5"/>
        <ellipse cx="100" cy="108" rx="60" ry="26" fill="#7c3aed" opacity=".15" stroke="#7c3aed" stroke-width="1"/>
        <text x="100" y="104" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">Inovação</text>
        <text x="100" y="117" text-anchor="middle" fill="#a78bfa" font-size="9">Disruptiva</text>

        <line x1="260" y1="198" x2="140" y2="210" stroke="#f5c518" stroke-width="1.5"/>
        <ellipse cx="90" cy="210" rx="60" ry="26" fill="#f5c518" opacity=".1" stroke="#f5c518" stroke-width="1"/>
        <text x="90" y="206" text-anchor="middle" fill="#f5c518" font-size="10" font-weight="700">Liderança</text>
        <text x="90" y="219" text-anchor="middle" fill="#f5c518" font-size="9">Adaptativa</text>

        <line x1="260" y1="222" x2="140" y2="310" stroke="#10b981" stroke-width="1.5"/>
        <ellipse cx="100" cy="318" rx="60" ry="26" fill="#10b981" opacity=".1" stroke="#10b981" stroke-width="1"/>
        <text x="100" y="314" text-anchor="middle" fill="#34d399" font-size="10" font-weight="700">Cultura</text>
        <text x="100" y="327" text-anchor="middle" fill="#34d399" font-size="9">Organizacional</text>

        <line x1="440" y1="210" x2="560" y2="120" stroke="#ff4d6d" stroke-width="1.5"/>
        <ellipse cx="600" cy="108" rx="60" ry="26" fill="#ff4d6d" opacity=".1" stroke="#ff4d6d" stroke-width="1"/>
        <text x="600" y="104" text-anchor="middle" fill="#ff4d6d" font-size="10" font-weight="700">Tecnologia</text>
        <text x="600" y="117" text-anchor="middle" fill="#ff4d6d" font-size="9">& Gestão</text>

        <line x1="440" y1="198" x2="560" y2="210" stroke="#06b6d4" stroke-width="1.5"/>
        <ellipse cx="612" cy="210" rx="60" ry="26" fill="#06b6d4" opacity=".1" stroke="#06b6d4" stroke-width="1"/>
        <text x="612" y="206" text-anchor="middle" fill="#06b6d4" font-size="10" font-weight="700">Agilidade</text>
        <text x="612" y="219" text-anchor="middle" fill="#06b6d4" font-size="9">Estratégica</text>

        <line x1="440" y1="222" x2="560" y2="310" stroke="#a78bfa" stroke-width="1.5"/>
        <ellipse cx="600" cy="318" rx="60" ry="26" fill="#a78bfa" opacity=".1" stroke="#a78bfa" stroke-width="1"/>
        <text x="600" y="314" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">Ecossistemas</text>
        <text x="600" y="327" text-anchor="middle" fill="#a78bfa" font-size="9">Digitais</text>

        <line x1="350" y1="170" x2="350" y2="70" stroke="#00d4ff" stroke-width="1.5"/>
        <ellipse cx="350" cy="52" rx="70" ry="26" fill="#00d4ff" opacity=".1" stroke="#00d4ff" stroke-width="1"/>
        <text x="350" y="48" text-anchor="middle" fill="#00d4ff" font-size="10" font-weight="700">Competitividade</text>
        <text x="350" y="61" text-anchor="middle" fill="#00d4ff" font-size="9">Sustentável</text>

        <line x1="350" y1="250" x2="350" y2="360" stroke="#f5c518" stroke-width="1.5"/>
        <ellipse cx="350" cy="378" rx="70" ry="26" fill="#f5c518" opacity=".1" stroke="#f5c518" stroke-width="1"/>
        <text x="350" y="374" text-anchor="middle" fill="#f5c518" font-size="10" font-weight="700">Resultado</text>
        <text x="350" y="387" text-anchor="middle" fill="#f5c518" font-size="9">Organizacional</text>
      </svg>
    </div>
    <button class="btn-dl" onclick="alert('Em produção: download do mapa em PDF de alta resolução.')">📥 Baixar Mapa em PDF</button>
  </div>

  <!-- M02 a M08 — estrutura simplificada mas funcional -->
  <div class="mapa-wrap" id="map-m02">
    <div class="mapa-header"><div class="mapa-mod">Módulo 02</div><div class="mapa-title">Design Thinking Aplicado</div></div>
    <div class="mapa-svg-wrap">
      <svg viewBox="0 0 700 350" xmlns="http://www.w3.org/2000/svg" font-family="Outfit,sans-serif">
        <rect width="700" height="350" fill="#0d1526" rx="12"/>
        <g>
          <rect x="20" y="140" width="100" height="70" rx="10" fill="#7c3aed" opacity=".2" stroke="#7c3aed" stroke-width="1"/>
          <text x="70" y="170" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700">EMPATIA</text>
          <text x="70" y="186" text-anchor="middle" fill="#a78bfa" font-size="9">Entender o usuário</text>
        </g>
        <line x1="120" y1="175" x2="170" y2="175" stroke="#6b7fa3" stroke-width="1.5" marker-end="url(#arr)"/>
        <g>
          <rect x="170" y="140" width="100" height="70" rx="10" fill="#00d4ff" opacity=".15" stroke="#00d4ff" stroke-width="1"/>
          <text x="220" y="170" text-anchor="middle" fill="#00d4ff" font-size="11" font-weight="700">DEFINIÇÃO</text>
          <text x="220" y="186" text-anchor="middle" fill="#00d4ff" font-size="9">Problema claro</text>
        </g>
        <line x1="270" y1="175" x2="320" y2="175" stroke="#6b7fa3" stroke-width="1.5"/>
        <g>
          <rect x="320" y="140" width="100" height="70" rx="10" fill="#f5c518" opacity=".15" stroke="#f5c518" stroke-width="1"/>
          <text x="370" y="170" text-anchor="middle" fill="#f5c518" font-size="11" font-weight="700">IDEAÇÃO</text>
          <text x="370" y="186" text-anchor="middle" fill="#f5c518" font-size="9">Gerar soluções</text>
        </g>
        <line x1="420" y1="175" x2="470" y2="175" stroke="#6b7fa3" stroke-width="1.5"/>
        <g>
          <rect x="470" y="140" width="100" height="70" rx="10" fill="#ff4d6d" opacity=".15" stroke="#ff4d6d" stroke-width="1"/>
          <text x="520" y="170" text-anchor="middle" fill="#ff4d6d" font-size="11" font-weight="700">PROTÓTIPO</text>
          <text x="520" y="186" text-anchor="middle" fill="#ff4d6d" font-size="9">Materializar ideias</text>
        </g>
        <line x1="570" y1="175" x2="620" y2="175" stroke="#6b7fa3" stroke-width="1.5"/>
        <g>
          <rect x="580" y="140" width="100" height="70" rx="10" fill="#10b981" opacity=".15" stroke="#10b981" stroke-width="1"/>
          <text x="630" y="170" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700">TESTE</text>
          <text x="630" y="186" text-anchor="middle" fill="#34d399" font-size="9">Validar com usuário</text>
        </g>
        <text x="350" y="40" text-anchor="middle" fill="#e8eef7" font-size="16" font-weight="700">As 5 Fases do Design Thinking</text>
        <text x="350" y="310" text-anchor="middle" fill="#6b7fa3" font-size="11">Processo iterativo · Centrado no usuário · Foco em empatia</text>
      </svg>
    </div>
    <button class="btn-dl" onclick="alert('Em produção: download do mapa em PDF de alta resolução.')">📥 Baixar Mapa em PDF</button>
  </div>

  <script>
  ['m03','m04','m05','m06','m07','m08'].forEach(id=>{
    const titles={m03:'Gestão Baseada em Dados',m04:'IA na Gestão Organizacional',m05:'Transformação Digital',m06:'Ecossistemas de Inovação',m07:'Governança Digital e Compliance',m08:'Projeto Final: Plano de Inovação'}
    const mnum={m03:'03',m04:'04',m05:'05',m06:'06',m07:'07',m08:'08'}
    const nodes={
      m03:['Coleta de Dados','KPIs','Dashboard','Analytics','Decisão','Data Lake','Governança'],
      m04:['Machine Learning','IA Generativa','RPA','Chatbots','Previsão','NLP','Ética em IA'],
      m05:['Cloud','Agile','DevOps','CX Digital','Cultura','Roadmap','ROI Digital'],
      m06:['Startups','VC','Open Innovation','Aceleradoras','FintTech','Parcerias','Ecossistema'],
      m07:['LGPD','Cibersegurança','Zero Trust','DPO','Compliance','Auditoria','Governança'],
      m08:['Diagnóstico','Visão','Portfólio','Priorização','Budget','KPIs','Pitch'],
    }
    const el=document.getElementById('map-'+id)
    if(el){
      const ns=nodes[id]||[]
      const cx=350,cy=175,r=120
      const svgNodes=ns.map((n,i)=>{
        const angle=(i/ns.length)*2*Math.PI-Math.PI/2
        const nx=cx+r*Math.cos(angle),ny=cy+r*Math.sin(angle)
        const color=['#00d4ff','#7c3aed','#f5c518','#ff4d6d','#10b981','#06b6d4','#a78bfa'][i%7]
        return `<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="${color}" stroke-width="1.5" opacity=".6"/>
          <ellipse cx="${nx}" cy="${ny}" rx="52" ry="22" fill="${color}" opacity=".12" stroke="${color}" stroke-width="1"/>
          <text x="${nx}" y="${ny+4}" text-anchor="middle" fill="${color}" font-size="10" font-weight="700">${n}</text>`
      }).join('')
      el.innerHTML=`
        <div class="mapa-header"><div class="mapa-mod">Módulo ${mnum[id]}</div><div class="mapa-title">${titles[id]}</div></div>
        <div class="mapa-svg-wrap">
          <svg viewBox="0 0 700 350" xmlns="http://www.w3.org/2000/svg" font-family="Outfit,sans-serif">
            <rect width="700" height="350" fill="#0d1526" rx="12"/>
            ${svgNodes}
            <ellipse cx="${cx}" cy="${cy}" rx="70" ry="30" fill="#00d4ff" opacity=".12" stroke="#00d4ff" stroke-width="1.5"/>
            <text x="${cx}" y="${cy+5}" text-anchor="middle" fill="#00d4ff" font-size="12" font-weight="700">${titles[id].split(' ').slice(0,2).join(' ')}</text>
          </svg>
        </div>
        <button class="btn-dl" onclick="alert('Em produção: download do mapa em PDF.')">📥 Baixar Mapa em PDF</button>`
    }
  })
  </script>
</div>

</div>
<script>
function showMap(id){
  document.querySelectorAll('.mapa-wrap').forEach(m=>m.classList.remove('show'))
  document.querySelectorAll('.ms').forEach(b=>b.classList.toggle('active',b.dataset.m===id))
  const el=document.getElementById('map-'+id)
  if(el)el.classList.add('show')
}
</script>
</body>
</html>
